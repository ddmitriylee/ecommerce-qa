name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint all workspaces
        run: npm run lint

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test

      - name: Run Server Coverage Report
        run: npm run coverage -w @ecommerce/server

      - name: Run Client Coverage Report
        run: npm run coverage -w @ecommerce/client

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e

      # ── Quality Gate: Coverage threshold check ──
      # The vitest coverage thresholds (80% lines/functions/statements)
      # are enforced in vitest.config.ts — the pipeline fails if not met.

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/server/coverage/
            apps/client/coverage/
          retention-days: 30
